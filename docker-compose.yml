services:
  postgres:
    image: postgres:16
    container_name: messenger_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: messenger_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: messenger_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: messenger_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: messenger_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin &&
      /usr/bin/mc mb -p local/messenger-files || true
      "

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - ./media:/app/media
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
      - minio-init
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.api_main:app --host 0.0.0.0 --port 8000 --workers 2"

  websocket:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - api
    ports:
      - "8001:8001"
    command: sh -c "export WEBSOCKET_INSTANCE_ID=$$(hostname) && uvicorn app.ws_main:app --host 0.0.0.0 --port 8001 --workers 2"

  workers:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: sh -c "python -m app.workers.main"

  analytics-worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - rabbitmq
    command: sh -c "python -m app.analytics.worker"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8001
      NEXT_PUBLIC_USE_LOCAL_MEDIA_UPLOAD: "true"
    depends_on:
      - api
      - websocket
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
