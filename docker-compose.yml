services:
  postgres:
    image: postgres:16-alpine
    container_name: messenger_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Low-memory PostgreSQL configuration
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
        -c shared_buffers=32MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=64MB
        -c max_connections=50
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c log_min_messages=warning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128m

  redis:
    image: redis:7-alpine
    container_name: messenger_redis
    restart: unless-stopped
    # Cap memory at 64MB and disable disk persistence (saves RAM & disk I/O)
    command: >
      redis-server
        --maxmemory 48mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 72m

  rabbitmq:
    # Use slim image without management UI (saves ~80-100MB RAM)
    image: rabbitmq:3.13-alpine
    container_name: messenger_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      # Reduce RabbitMQ memory headroom
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.4"
    ports:
      - "5672:5672"
    deploy:
      resources:
        limits:
          memory: 192m

  minio:
    image: minio/minio:latest
    container_name: messenger_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    # Only start the API server, skip the console UI (saves memory)
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 128m

  minio-init:
    image: minio/mc:latest
    container_name: messenger_minio_init
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin &&
      /usr/bin/mc mb -p local/messenger-files || true
      "
    deploy:
      resources:
        limits:
          memory: 32m

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - ./media:/app/media
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
      - minio-init
    ports:
      - "8000:8000"
    # 1 worker instead of 2 → saves ~80MB per extra worker
    command: sh -c "alembic upgrade head && uvicorn app.api_main:app --host 0.0.0.0 --port 8000 --workers 1"
    deploy:
      resources:
        limits:
          memory: 256m

  websocket:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - api
    ports:
      - "8001:8001"
    # 1 worker instead of 2
    command: sh -c "export WEBSOCKET_INSTANCE_ID=$$(hostname) && uvicorn app.ws_main:app --host 0.0.0.0 --port 8001 --workers 1"
    deploy:
      resources:
        limits:
          memory: 192m

  workers:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: python -m app.workers.main
    deploy:
      resources:
        limits:
          memory: 128m

  analytics-worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - rabbitmq
    command: python -m app.analytics.worker
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
  minio_data:
